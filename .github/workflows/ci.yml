name: CI / CD - jthies73

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_IP: ${{ secrets.VPS_IP }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$VPS_IP" >> ~/.ssh/known_hosts

          # Copy jthies73.html directly to the target location on the VPS host.
          # Using tee ensures the file inode remains unchanged, allowing running
          # container mounts to see the updates instantly.
          cat jthies73.html | ssh "$VPS_USER@$VPS_IP" \
            "sudo mkdir -p /usr/share/nginx/html && sudo tee /usr/share/nginx/html/jthies73.html > /dev/null && sudo chmod 644 /usr/share/nginx/html/jthies73.html"

